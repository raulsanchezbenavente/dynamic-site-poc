<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1" />
    <title>FakeMiles Access</title>
    <style>
      :root {
        color-scheme: light;
        --lm-navy: #072b5a;
        --lm-navy-deep: #041832;
        --lm-cyan: #20c9f3;
        --lm-red: #d9303e;
        --lm-text: #1d2a39;
        --lm-muted: #5b6b7f;
        --lm-border: #cfdae7;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font-family: 'Montserrat', 'Segoe UI', sans-serif;
        background:
          radial-gradient(circle at 10% 10%, rgba(32, 201, 243, 0.22), transparent 44%),
          radial-gradient(circle at 86% 84%, rgba(217, 48, 62, 0.2), transparent 40%),
          linear-gradient(160deg, var(--lm-navy) 0%, var(--lm-navy-deep) 100%);
        padding: 22px;
      }
      .card {
        width: min(440px, 92vw);
        padding: 30px 28px 24px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.34);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(246, 250, 255, 0.96));
        box-shadow:
          0 22px 48px rgba(2, 10, 24, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
      }
      .brand {
        display: inline-block;
        align-items: baseline;
        margin-bottom: 10px;
        font-size: 38px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.01em;
        color: var(--lm-navy);
      }
      .brand em {
        font-style: normal;
        color: var(--lm-red);
      }
      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.2;
        color: var(--lm-text);
      }
      p {
        margin: 8px 0 20px;
        color: var(--lm-muted);
        font-size: 14px;
      }
      label {
        display: block;
        margin: 14px 0 7px;
        color: #213247;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.01em;
      }
      input {
        width: 100%;
        padding: 11px 12px;
        border: 1px solid var(--lm-border);
        border-radius: 10px;
        outline: 0;
        transition:
          border-color 120ms ease,
          box-shadow 120ms ease;
      }
      input:focus {
        border-color: var(--lm-cyan);
        box-shadow: 0 0 0 3px rgba(32, 201, 243, 0.2);
      }
      button {
        margin-top: 18px;
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.01em;
        color: #fff;
        background: linear-gradient(135deg, var(--lm-red), #c82635);
        cursor: pointer;
        box-shadow: 0 9px 18px rgba(217, 48, 62, 0.34);
      }
      button:hover {
        filter: brightness(1.03);
      }
      .hint {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px dashed #d7e1eb;
        font-size: 12px;
        color: #5f7084;
      }
    </style>
  </head>
  <body>
    <form
      action="/auth/dev-login"
      class="card"
      method="post">
      <div class="brand">Fake<em>Miles</em></div>
      <h1 id="loginHeading">Sign in to your account</h1>
      <p id="loginSubtitle">SSO local dev. Any username and password are accepted in this local bypass mode.</p>

      {{HIDDEN_FIELDS}}

      <label
        id="usernameLabel"
        for="username"
        >Username</label
      >
      <input
        id="username"
        name="username"
        type="text"
        value="developer"
        autocomplete="username" />
      <label
        id="passwordLabel"
        for="password"
        >Password</label
      >
      <input
        id="password"
        name="password"
        type="password"
        value="dev"
        autocomplete="current-password" />
      <button
        id="signinButton"
        type="submit"
        >Sign In</button
      >
      <div
        id="loginHint"
        class="hint">
        After sign-in, you will be redirected automatically to the provided redirect_uri.
      </div>
    </form>
    <script>
      (function () {
        var dictionaries = {
          en: {
            pageTitle: 'FakeMiles Access',
            heading: 'Sign in to your account',
            subtitle: 'SSO local dev. Any username and password are accepted in this local bypass mode.',
            usernameLabel: 'Username',
            passwordLabel: 'Password',
            signInLabel: 'Sign In',
            hint: 'After sign-in, you will be redirected automatically to the provided redirect_uri.',
          },
          es: {
            pageTitle: 'Acceso FakeMiles',
            heading: 'Inicia sesion en tu cuenta',
            subtitle: 'SSO local de desarrollo. En este modo bypass local se acepta cualquier usuario y contrasena.',
            usernameLabel: 'Usuario',
            passwordLabel: 'Contrasena',
            signInLabel: 'Iniciar sesion',
            hint: 'Despues del inicio de sesion seras redirigido automaticamente al redirect_uri indicado.',
          },
          fr: {
            pageTitle: 'Acces FakeMiles',
            heading: 'Connectez-vous a votre compte',
            subtitle:
              'SSO local de developpement. Tout identifiant et mot de passe sont acceptes dans ce mode bypass local.',
            usernameLabel: 'Identifiant',
            passwordLabel: 'Mot de passe',
            signInLabel: 'Se connecter',
            hint: 'Apres connexion, vous serez redirige automatiquement vers le redirect_uri fourni.',
          },
          pt: {
            pageTitle: 'Acesso FakeMiles',
            heading: 'Entre na sua conta',
            subtitle: 'SSO local de desenvolvimento. Qualquer usuario e senha sao aceitos neste modo de bypass local.',
            usernameLabel: 'Usuario',
            passwordLabel: 'Senha',
            signInLabel: 'Entrar',
            hint: 'Apos o login, voce sera redirecionado automaticamente para o redirect_uri informado.',
          },
        };

        function normalizeLang(value) {
          var input = String(value || '').trim().toLowerCase();
          if (!input) return null;
          var normalized = input.replace('_', '-').split('-')[0];
          return dictionaries[normalized] ? normalized : null;
        }

        function pickFromList(value) {
          var raw = String(value || '').trim();
          if (!raw) return null;
          var parts = raw.split(/[\s,]+/);
          for (var i = 0; i < parts.length; i += 1) {
            var lang = normalizeLang(parts[i]);
            if (lang) return lang;
          }
          return null;
        }

        function resolveLangFromRedirectUri(value) {
          var uri = String(value || '').trim();
          if (!uri) return null;
          try {
            var parsed = new URL(uri, window.location.origin);
            var segment = (parsed.pathname.split('/').filter(Boolean)[0] || '').trim();
            return normalizeLang(segment);
          } catch (_) {
            return null;
          }
        }

        var search = new URLSearchParams(window.location.search || '');
        var hiddenUiLocales = document.querySelector('input[name="ui_locales"]');
        var hiddenKcLocale = document.querySelector('input[name="kc_locale"]');
        var hiddenRedirectUri = document.querySelector('input[name="redirect_uri"]');

        var uiLocales = (hiddenUiLocales && hiddenUiLocales.value) || search.get('ui_locales') || '';
        var kcLocale = (hiddenKcLocale && hiddenKcLocale.value) || search.get('kc_locale') || '';
        var redirectUri = (hiddenRedirectUri && hiddenRedirectUri.value) || search.get('redirect_uri') || '';

        var lang =
          pickFromList(uiLocales) || normalizeLang(kcLocale) || resolveLangFromRedirectUri(redirectUri) || 'en';
        var copy = dictionaries[lang] || dictionaries.en;

        var title = document.querySelector('title');
        if (title) title.textContent = copy.pageTitle;

        var heading = document.getElementById('loginHeading');
        if (heading) heading.textContent = copy.heading;

        var subtitle = document.getElementById('loginSubtitle');
        if (subtitle) subtitle.textContent = copy.subtitle;

        var usernameLabel = document.getElementById('usernameLabel');
        if (usernameLabel) usernameLabel.textContent = copy.usernameLabel;

        var passwordLabel = document.getElementById('passwordLabel');
        if (passwordLabel) passwordLabel.textContent = copy.passwordLabel;

        var signinButton = document.getElementById('signinButton');
        if (signinButton) signinButton.textContent = copy.signInLabel;

        var hint = document.getElementById('loginHint');
        if (hint) hint.textContent = copy.hint;

        document.documentElement.lang = lang;
      })();
    </script>
  </body>
</html>
