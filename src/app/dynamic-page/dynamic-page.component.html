
<div class="page">
  <ng-container *ngFor="let row of rows">
    <div class="row-grid">
      <ng-container *ngFor="let col of row.cols">
        <div class="col" [style.gridColumn]="'span ' + (col.span ?? 12)">
          <ng-container
            *ngComponentOutlet="componentMap[col.component]; inputs: getInputs(col)">
          </ng-container>
        </div>
      </ng-container>
    </div>
  </ng-container>
</div>
