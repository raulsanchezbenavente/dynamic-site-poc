<header
  class="bh-header"
  role="banner">
  <div class="bh-inner">
    <a
      class="bh-logo"
      [attr.href]="homePath()"
      aria-label="Avianca"
      (click)="goHome($event)">
      <span class="bh-logo-text">avianca</span>
      <svg
        class="bh-logo-mark"
        viewBox="0 0 64 32"
        aria-hidden="true">
        <path
          d="M4 22c10-10 22-14 34-10 6 2 13 6 22 12-14-2-24 0-30 3-8 4-14 3-26-5z"
          fill="currentColor" />
      </svg>
    </a>

    @if (activeStepIndex() !== null) {
      <ol
        class="bh-steps"
        aria-label="Booking steps">
        @for (step of bookingSteps; track step.key; let i = $index; let isLast = $last) {
          <li
            class="bh-step"
            [class.is-active]="isStepActive(i)"
            [class.is-complete]="isStepComplete(i)">
            <span class="bh-step-circle">
              @if (isStepComplete(i)) {
                <svg
                  class="bh-step-check"
                  viewBox="0 0 24 24"
                  aria-hidden="true">
                  <path
                    d="M20 6L9 17l-5-5"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
              } @else {
                {{ i + 1 }}
              }
            </span>
            <span class="bh-step-label">{{ step.labelKey | translate }}</span>
            @if (!isLast) {
              <span
                class="bh-step-line"
                aria-hidden="true"></span>
            }
          </li>
        }
      </ol>
    }
  </div>
</header>
