<section class="as-shell">
  <div class="as-card">
    <header class="as-header">
      <h2 class="as-title">{{ 'ASSIST.TITLE' | translate }}</h2>
      <button
        type="button"
        class="as-close"
        (click)="close.emit()">
        {{ 'ASSIST.CLOSE' | translate }}
      </button>
    </header>

    <div class="as-body">
      <section class="as-left">
        <label class="as-row as-row--main">
          <input
            type="checkbox"
            [checked]="passengers[0].checked"
            (change)="togglePassenger('all')" />
          <span class="as-row-label">{{ passengers[0].nameKey | translate }}</span>
          <span class="as-row-price">€ 38,09</span>
        </label>

        <div class="as-subrows">
          @for (p of passengers.slice(1); track p.id) {
            <label class="as-row as-row--sub">
              <input
                type="checkbox"
                [checked]="p.checked"
                (change)="togglePassenger(p.id)" />
              <span class="as-row-label">{{ p.nameKey | translate }}</span>
              <span class="as-row-price">€ 38,09</span>
            </label>
          }
        </div>
      </section>

      <aside class="as-right">
        <div class="as-illustration">
          <img
            src="/assets/illustrations/extras/assist.svg"
            [alt]="'ASSIST.IMG_ALT' | translate" />
        </div>
        <div class="as-info">
          <h3>{{ 'ASSIST.INFO_TITLE' | translate }}</h3>
          <p>{{ 'ASSIST.INFO_SUBTITLE' | translate }}</p>
          <ul>
            @for (b of benefitsKeys; track b) {
              <li>✓ {{ b | translate }}</li>
            }
          </ul>
        </div>
      </aside>
    </div>

    <footer class="as-footer">
      <div class="as-total">
        <span>{{ 'ASSIST.TOTAL_ALL' | translate }}</span>
        <strong>€ 0,00</strong>
      </div>
      <button
        type="button"
        class="as-cta"
        (click)="close.emit()">
        {{ 'ASSIST.CTA_SAVE' | translate }}
      </button>
    </footer>
  </div>
</section>
