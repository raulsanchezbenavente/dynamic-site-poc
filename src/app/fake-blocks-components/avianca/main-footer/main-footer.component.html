<footer
  class="ft-wrap"
  role="contentinfo">
  <div class="ft-inner">
    <div class="ft-top">
      <div
        class="ft-brand"
        aria-label="Avianca">
        <span class="ft-logo">avianca</span>
        <svg
          class="ft-mark"
          viewBox="0 0 64 32"
          aria-hidden="true">
          <path
            d="M4 22c10-10 22-14 34-10 6 2 13 6 22 12-14-2-24 0-30 3-8 4-14 3-26-5z"
            fill="currentColor" />
        </svg>
      </div>

      <div class="ft-follow">
        <div class="ft-follow-title">{{ followTitle() | translate }}</div>
        <div
          class="ft-social"
          aria-label="Social links">
          <a
            class="ft-social-btn"
            href="#"
            aria-label="X"
            (click)="$event.preventDefault()"
            >x</a
          >
          <a
            class="ft-social-btn"
            href="#"
            aria-label="Facebook"
            (click)="$event.preventDefault()"
            >f</a
          >
          <a
            class="ft-social-btn"
            href="#"
            aria-label="Instagram"
            (click)="$event.preventDefault()"
            >⌁</a
          >
          <a
            class="ft-social-btn"
            href="#"
            aria-label="LinkedIn"
            (click)="$event.preventDefault()"
            >in</a
          >
        </div>
      </div>
    </div>

    <div class="ft-grid">
      @for (col of columns(); track trackByTitle($index, col)) {
        <div class="ft-col">
          <h3 class="ft-col-title">{{ col.title | translate }}</h3>

          @for (link of col.links; track trackByLink($index, link)) {
            <a
              class="ft-link"
              [href]="link.href || '#'"
              (click)="$event.preventDefault()">
              <span class="ft-link-text">{{ link.label | translate }}</span>

              @if (link.external) {
                <span
                  class="ft-ext"
                  aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path
                      d="M14 3h7v7"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round" />
                    <path
                      d="M21 3l-9 9"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round" />
                    <path
                      d="M10 7H7a4 4 0 0 0-4 4v6a4 4 0 0 0 4 4h6a4 4 0 0 0 4-4v-3"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round" />
                  </svg>
                </span>
              }
            </a>
          }
        </div>
      }
    </div>
  </div>
</footer>
