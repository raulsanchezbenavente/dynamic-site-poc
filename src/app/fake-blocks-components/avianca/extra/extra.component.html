<section class="ex-shell">
  <div class="ex-wrap">
    <h2 class="ex-title">{{ 'EXTRAS.TITLE' | translate }}</h2>

    <div class="ex-grid">
      @for (card of extras; track card.titleKey) {
        <article class="ex-card">
          <div class="ex-card-media">
            <img
              class="ex-card-img"
              [src]="card.imageUrl"
              [alt]="card.imageAltKey | translate" />
          </div>

          <div class="ex-card-body">
            <h3 class="ex-card-title">{{ card.titleKey | translate }}</h3>
            <p class="ex-card-desc">{{ card.descriptionKey | translate }}</p>

            <div class="ex-card-footer">
              <div class="ex-card-price">
                <span class="ex-card-from">{{ card.priceLabelKey | translate }}</span>
                @if (card.priceKey) {
                  <span class="ex-card-amount">{{ card.priceKey | translate }}</span>
                } @else {
                  <span class="ex-card-amount">{{ card.price }}</span>
                }
              </div>
              <span
                class="ex-card-arrow"
                aria-hidden="true"
                >›</span
              >
            </div>
          </div>
        </article>
      }
    </div>

    <div class="ex-actions">
      <button
        type="button"
        class="ex-continue">
        {{ 'EXTRAS.CTA_CONTINUE' | translate }}
      </button>
    </div>
  </div>
</section>
