{{ tabsId() }}
{{ activeId() }}
<div class="ds-tabs" rol e="tablist" aria-label="Tabs">
  <button
    type="button"
    class="ds-tab"
    role="tab"
    *ngFor="let tab of viewTabs(); trackBy: trackById"
    [attr.id]="tabButtonId(tab.tabId)"
    [attr.aria-controls]="tabPanelId(tab.tabId)"
    [attr.aria-selected]="tab.tabId === activeId()"
    [class.is-active]="tab.tabId === activeId()"
    (click)="select(tab.tabId)"
  >
    {{ tab.title }}
  </button>
</div>

<section
  class="ds-tab-panel"
  role="tabpanel"
  *ngIf="activeTab() as tab"
  [attr.id]="tabPanelId(tab.tabId)"
  [attr.aria-labelledby]="tabButtonId(tab.tabId)"
>
  <ds-dynamic-blocks [blocks]="tab.components"></ds-dynamic-blocks>
</section>
