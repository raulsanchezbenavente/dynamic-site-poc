<div class="lm-shell">
  <section
    class="lm-wrap"
    role="region"
    aria-label="Account summary"
    [style.--lm-grad-start]="gradientStartColor()"
    [style.--lm-grad-end]="gradientEndColor()">
    <header class="lm-header">
      <div class="lm-title">
        <span class="lm-hello">{{ 'LOYALTY.HELLO' | translate }},</span>
        <span class="lm-name">{{ displayName() }}</span>
      </div>

      <div
        class="lm-brand"
        aria-label="LifeMiles">
        <span class="lm-brand-mark">lm</span>
        <span class="lm-brand-text">LifeMiles</span>
      </div>
    </header>

    <div class="lm-card">
      <div class="lm-cell lm-cell--main">
        <div class="lm-label">{{ 'LOYALTY.TITLE' | translate }}</div>
        <div class="lm-value-row">
          <div class="lm-value">{{ displayMemberNumber() }}</div>

          <button
            type="button"
            class="lm-copy"
            aria-label="Copy Lifemiles number"
            title="Copy"
            (click)="copy(displayMemberNumber())">
            ⧉
          </button>
        </div>
      </div>

      <div
        class="lm-divider"
        aria-hidden="true"></div>

      <div class="lm-cell">
        <div class="lm-label">{{ 'LOYALTY.TOTAL_MILES' | translate }}</div>
        <div class="lm-value-row">
          <span
            class="lm-badge"
            aria-hidden="true"
            [style.background]="accentColor()"
            >lm</span
          >
          <div class="lm-value">{{ displayTotalMiles() }}</div>
        </div>
      </div>

      <div
        class="lm-divider"
        aria-hidden="true"></div>

      <div class="lm-cell">
        <div class="lm-label">{{ 'LOYALTY.EXPIRATION' | translate }}</div>
        <div class="lm-subvalue">{{ displayExpirationDate() }}</div>
      </div>
    </div>
  </section>
</div>
