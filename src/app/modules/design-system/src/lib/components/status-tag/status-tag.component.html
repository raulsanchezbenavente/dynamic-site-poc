@let config = mergedConfig();

@if (config.status) {
    <span
        class="status-tag"
        [ngClass]="styleClasses()">
        @if (config.style !== StatusTagStyles.NO_ICON) {
            <span
                class="status-tag_icon text-space-gap"
                role="img"
                [attr.aria-label]="iconAriaLabel()">
            </span>
        }
        <span class="status-tag_text">
            {{ config.text }}
        </span>
    </span>
}
