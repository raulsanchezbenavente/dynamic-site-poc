<div class="ds-data-not-found-inner">
    @if (config.icon) {
        <icon [config]="config.icon"></icon>
    }
    @if (config.text) {
        <div class="ds-data-not-found_text">
            {{ config.text }}
        </div>
    }
    @if (config.secondaryText) {
        <div class="ds-data-not-found_secondary-text">
            {{ config.secondaryText }}
        </div>
    }
    <div class="ds-data-not-found_action">
        <ng-content></ng-content>
    </div>
</div>
