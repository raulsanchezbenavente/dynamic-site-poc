@if (config) {
    <ul
        class="ds-list_list"
        [ngClass]="appearance ? 'ds-list_list--style-' + appearance : null"
        [attr.aria-label]="config.ariaAttributes?.ariaLabel ?? null"
        [attr.aria-describedby]="config.ariaAttributes?.ariaDescribedBy ?? null">
        @for (item of items; track item) {
            <li
                class="ds-list-item"
                [class.ds-list_item--disabled]="item.isDisabled"
                [ngClass]="item.cssClass">
                @if (item.icon) {
                    <icon
                        dsListIcon
                        [config]="item.icon"></icon>
                }
                <div [innerHTML]="item.safeContent"></div>
            </li>
        }
    </ul>
}
