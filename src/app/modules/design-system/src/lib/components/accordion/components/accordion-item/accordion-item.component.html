<div
    class="ds-accordion-item_header"
    role="heading"
    [attr.aria-level]="headingLevel()">
    <button
        #triggerButton
        class="ds-accordion-item_trigger"
        [id]="triggerId()"
        [attr.aria-expanded]="!isCollapsed()"
        [attr.aria-controls]="contentId()"
        [attr.aria-disabled]="isDisabled()"
        (click)="onToggleRequest()"
        (keydown)="onKeydown($event)">
        <span class="ds-accordion-item_trigger_title">
            {{ title() }}
        </span>
    </button>
</div>

@if (!isCollapsed()) {
    <div
        class="ds-accordion-item_content"
        role="region"
        [id]="contentId()"
        [attr.aria-labelledby]="triggerId()"
        [@collapseAnimation]="isCollapsed()">
        <div class="ds-accordion-item_body">
            <div class="ds-accordion-item_body_content">
                <ng-content></ng-content>
            </div>
        </div>
    </div>
}
