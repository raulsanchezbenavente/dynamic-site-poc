<section class="jg-shell">
  <div class="jg-header">
    <div>
      <p class="jg-eyebrow">UI+ Game</p>
      <h2 class="jg-title">Icon Hunter</h2>
      <p class="jg-status">{{ statusText() }}</p>
    </div>

    <button
      type="button"
      class="jg-start"
      (click)="startGame()">
      {{ isPlaying() ? 'Restart' : timeLeft() < 20 ? 'Play again' : 'Start' }}
    </button>
  </div>

  <div class="jg-stats">
    <article class="jg-stat">
      <span>Score</span>
      <strong>{{ score() }}</strong>
    </article>
    <article class="jg-stat">
      <span>Combo</span>
      <strong>x{{ combo() }}</strong>
    </article>
    <article class="jg-stat">
      <span>Time</span>
      <strong>{{ timeLeft() }}s</strong>
    </article>
    <article class="jg-stat">
      <span>Best</span>
      <strong>{{ highScore() }}</strong>
    </article>
  </div>

  <div
    class="jg-board"
    [class.jg-board-playing]="isPlaying()">
    @if (!isPlaying()) {
      <p class="jg-overlay-text">Press "Start" to begin the 20-second game.</p>
    }

    <button
      type="button"
      class="jg-target"
      aria-label="Game target"
      [disabled]="!isPlaying()"
      [style.left.%]="targetX()"
      [style.top.%]="targetY()"
      [style.width.px]="targetSize()"
      [style.height.px]="targetSize()"
      (click)="hitTarget()">
      ✈
    </button>
  </div>
</section>
