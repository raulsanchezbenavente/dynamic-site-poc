<section class="jg-shell">
  <div class="jg-header">
    <div>
      <p class="jg-eyebrow">Juego UI+</p>
      <h2 class="jg-title">Caza el icono</h2>
      <p class="jg-status">{{ statusText() }}</p>
    </div>

    <button
      type="button"
      class="jg-start"
      (click)="startGame()">
      {{ isPlaying() ? 'Reiniciar' : timeLeft() < 20 ? 'Jugar otra vez' : 'Empezar' }}
    </button>
  </div>

  <div class="jg-stats">
    <article class="jg-stat">
      <span>Puntos</span>
      <strong>{{ score() }}</strong>
    </article>
    <article class="jg-stat">
      <span>Combo</span>
      <strong>x{{ combo() }}</strong>
    </article>
    <article class="jg-stat">
      <span>Tiempo</span>
      <strong>{{ timeLeft() }}s</strong>
    </article>
    <article class="jg-stat">
      <span>Record</span>
      <strong>{{ highScore() }}</strong>
    </article>
  </div>

  <div class="jg-board" [class.jg-board-playing]="isPlaying()">
    @if (!isPlaying()) {
      <p class="jg-overlay-text">Presiona "Empezar" para iniciar la partida de 20 segundos.</p>
    }

    <button
      type="button"
      class="jg-target"
      aria-label="Objetivo del juego"
      [disabled]="!isPlaying()"
      [style.left.%]="targetX()"
      [style.top.%]="targetY()"
      [style.width.px]="targetSize()"
      [style.height.px]="targetSize()"
      (click)="hitTarget()">
      ✈
    </button>
  </div>
</section>
