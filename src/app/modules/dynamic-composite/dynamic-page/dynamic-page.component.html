<div class="page">
  @for (row of rows; track row) {
    <div
      class="row-grid"
      [class.row-grid--with-rte]="hasRteInjector(row)">
      @for (col of row.cols; track col) {
        <div
          class="col"
          [style.gridColumn]="'span ' + (col.span ?? 12)">
          <block-outlet [block]="col"></block-outlet>
        </div>
      }
    </div>
  }
</div>
