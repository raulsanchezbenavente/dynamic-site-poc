<div class="tabs-shell">
  <div
    #tabsRoot
    class="tabs"
    role="tablist"
    aria-label="Tabs">
    <span
      class="tab-indicator"
      aria-hidden="true"
      [style.width.px]="indicatorWidth()"
      [style.transform]="indicatorTransform()"></span>
    @for (tab of viewTabs(); track trackById($index, tab)) {
      <button
        #tabButton
        type="button"
        class="tab"
        role="tab"
        [attr.id]="tabButtonId(tab.tabId)"
        [attr.aria-controls]="tabPanelId(tab.tabId)"
        [attr.aria-selected]="tab.tabId === activeId()"
        [class.is-active]="tab.tabId === activeId()"
        (click)="select(tab)">
        {{ tab.title }}
      </button>
    }
  </div>

  @for (tab of viewTabs(); track trackById($index, tab)) {
    @if (isTabRendered(tab.tabId)) {
      <section
        class="tab-panel"
        role="tabpanel"
        [attr.id]="tabPanelId(tab.tabId)"
        [attr.aria-labelledby]="tabButtonId(tab.tabId)"
        [attr.aria-hidden]="tab.tabId !== activeId()"
        [hidden]="tab.tabId !== activeId()">
        <div
          class="tab-panel-body"
          [class.is-loading]="isTabLoading(tab.tabId)">
          @if (isTabLoading(tab.tabId)) {
            <div
              class="tab-skeleton"
              aria-hidden="true">
              <div class="tab-skeleton__line tab-skeleton__line--lg"></div>
              <div class="tab-skeleton__line tab-skeleton__line--md"></div>
              <div class="tab-skeleton__line tab-skeleton__line--sm"></div>
              <div class="tab-skeleton__line tab-skeleton__line--md"></div>
              <div class="tab-skeleton__line tab-skeleton__line--lg"></div>
              <div class="tab-skeleton__line tab-skeleton__line--sm"></div>
            </div>
          }

          <div class="page">
            @for (row of tab.layout; track row) {
              <div class="row-grid">
                @for (col of row.cols ?? []; track col) {
                  <div
                    class="col"
                    [style.gridColumn]="'span ' + getColColumns(col)">
                    <block-outlet [block]="col"></block-outlet>
                  </div>
                }
              </div>
            }
          </div>
        </div>
      </section>
    }
  }
</div>
