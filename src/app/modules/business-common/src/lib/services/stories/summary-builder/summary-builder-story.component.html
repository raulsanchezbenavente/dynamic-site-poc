<h1>All Custom Html</h1>
<ds-summary-renderer [config]="configSummary">
    <div class="card border-secondary shadow-sm">
        <div><strong>My Custom Summary</strong></div>
        <br />
        <div class="card-body">
            📝 <b summary-data-label="name"></b> <br />
            👉 <span summary-data-value="name"></span>
            <div style="width: 100%; border-top: 1px dashed #bbb; margin: 10px 0"></div>
            🧑‍💼 <b summary-data-label="surname"></b> <br />
            ✨ <span summary-data-value="surname"></span>
            <div style="width: 100%; border-top: 1px dashed #bbb; margin: 10px 0"></div>
            📧 <b summary-data-label="email"></b> <br />
            ✉️ <span summary-data-value="email"></span>
        </div>
    </div>
</ds-summary-renderer>

<br /><br /><br />
<hr />
<h1>Build Summary Using Reused Components</h1>
<ds-layout-swapper #layoutSwap>
    <ng-template layoutSlot="SECTION_1">
        <rf-form-builder
            #formAviation
            [name]="'formAviation'"
            [config]="bypassedConfig"
            [displayErrorsMode]="currentDisplayErrorMode">
            <grid-builder
                [config]="formConfig"
                [columns]="3"
                (configChange)="bypassedConfig = $event"></grid-builder>
        </rf-form-builder>
        <div style="text-align: right; margin-top: 10px">
            <button
                class="stbook-btn stbook-btn-success"
                (click)="parseConfig()">
                Save
            </button>
        </div>
    </ng-template>
    <ng-template layoutSlot="SECTION_2">
        <ds-summary-renderer [config]="bypassConfigToReplace">
            <ds-summary-builder
                [config]="bypassConfigSummaryToCreator"
                (configChange)="bypassConfigToReplace = $event"></ds-summary-builder>
        </ds-summary-renderer>
        <br />
        <div style="text-align: right; margin-top: 10px">
            <button
                class="stbook-btn stbook-btn-success"
                (click)="layoutSwap.showProjection('SECTION_1')">
                Edit
            </button>
        </div>
    </ng-template>
</ds-layout-swapper>

<br /><br />
