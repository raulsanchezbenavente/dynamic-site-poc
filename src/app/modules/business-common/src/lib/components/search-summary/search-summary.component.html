@let infoData = infoDataDescriptionList();
@let originAndDestinationData = originAndDestination();

<div class="search-summary-inner">
    <div class="search-summary_route">
        <span class="search-summary_route_departure text-space-gap">
            {{ 'City.' + originAndDestinationData[0] | translate }}
        </span>
        <span class="search-summary_route_connector text-space-gap">
            {{ 'Common.To' | translate }}
        </span>
        <span class="search-summary_route_return">
            {{ 'City.' + originAndDestinationData[1] | translate }}
        </span>
    </div>
    @if (infoData) {
        <div class="search-summary_data">
            <description-list [config]="infoData"></description-list>
        </div>
    }
</div>
