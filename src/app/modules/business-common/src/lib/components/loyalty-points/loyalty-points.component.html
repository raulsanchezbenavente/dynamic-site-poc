<span class="ds-loyalty-points">
    <span
        class="ds-loyalty-points_value"
        [class.is-positive]="loyaltyPointsModel.symbol && loyaltyPointsModel.isPositiveSymbol"
        [class.is-negative]="loyaltyPointsModel.symbol && !loyaltyPointsModel.isPositiveSymbol">
        @if (loyaltyPointsModel.symbol) {
            <span class="ds-loyalty-points_value_symbol text-space-gap">
                {{ loyaltyPointsModel.symbol }}
            </span>
        }
        <span class="ds-loyalty-points_value_amount text-space-gap">
            {{ loyaltyPointsModel.amount }}
        </span>
    </span>
    <span class="ds-loyalty-points_unit">
        {{ loyaltyPointsModel.label! | translate }}
    </span>
</span>
