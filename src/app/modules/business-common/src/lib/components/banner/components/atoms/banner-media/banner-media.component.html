<!-- imagen -->
@if (config.imageMedia) {
    <picture class="banner-media_image">
        @if (config.imageMedia.bgL?.url) {
            <source
                [srcset]="config.imageMedia.bgL?.url"
                [attr.alt]="config.imageMedia.text"
                [attr.media]="
                    '(min-width: ' + bannerConfig.layout.breakpoints.largeSize + bannerConfig.layout.sizeUnit + ')'
                " />
        }
        @if (config.imageMedia.bgM?.url) {
            <source
                [srcset]="config.imageMedia.bgM?.url"
                [attr.alt]="config.imageMedia.text"
                [attr.media]="
                    '(min-width: ' + bannerConfig.layout.breakpoints.mediumSize + bannerConfig.layout.sizeUnit + ')'
                " />
        }
        @if (config.imageMedia.bg.url) {
            <img
                loading="lazy"
                [src]="config.imageMedia.bg.url"
                [alt]="config.imageMedia.text" />
        }
    </picture>
}

<!-- video -->
@if (config.videoMedia) {
    <div class="banner-media_video">
        @if (config.videoMedia.upload.url) {
            <video
                #videoPlayer
                class="banner-video"
                playsinline
                [attr.width]="config.videoMedia.upload.width"
                [attr.height]="config.videoMedia.upload.height"
                [attr.title]="config.videoMedia.upload.controls ? config.videoMedia.text : null"
                [autoplay]="config.videoMedia.upload.autoplay"
                [muted]="config.videoMedia.upload.muted"
                [controls]="config.videoMedia.upload.controls"
                [loop]="config.videoMedia.upload.loop">
                <source
                    [src]="config.videoMedia.upload.url"
                    [attr.type]="'video/' + config.videoMedia.upload.extension" />
            </video>
        }
        @if (!config.videoMedia.upload.controls) {
            <span class="hide-visually">
                {{ config.videoMedia.text }}
            </span>
        }
    </div>
}
