@if (loaded) {
    @if (summaryConfig.showPaxGroup) {
        <div class="summary-typology_passenger-types">
            <passenger-types [model]="passengerTypesModel" />
        </div>
    }
    @if (translationKeys.SummaryTypology_PerJourney_Title | translate) {
        <h2 class="summary-typology_title">
            {{ translationKeys.SummaryTypology_PerJourney_Title | translate }}
        </h2>
    }
    <section
        class="summary-typology_price-breakdown"
        [class.summary-typology_price-breakdown--has-services-and-journeys]="hasServicesAndJourneys">
        <price-breakdown [model]="priceBreakdownModel"> </price-breakdown>
    </section>
}
