<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Avianca</title>
        <!-- DYNAMIC_SEO_TAGS -->
        <base href="/" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no" />
        <link
            rel="icon"
            type="image/x-icon"
            href="favicon-32x32.png" />
        <style>
            #boot-loader {
                position: fixed;
                inset: 0;
                display: grid;
                place-items: center;
                background: #fff;
                z-index: 9999;
            }
        </style>
    </head>
    <body>
        <div
            id="boot-loader"
            role="status"
            aria-live="polite"
            aria-label="Loading page">
            <img
                src="/assets/loader/plane-loader.gif"
                alt="Loading"
                width="180"
                height="180"
                decoding="async"
                fetchpriority="high" />
        </div>
        <app-root></app-root>
    </body>
</html>
