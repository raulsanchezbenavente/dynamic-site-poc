<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Avianca</title>
    <meta
      name="enable-dynamic-seo"
      content="true" />
    <!-- DYNAMIC_ANALYTICS_SCRIPTS -->
    <!-- DYNAMIC_SEO_TAGS_SSR -->
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" />
    <link
      rel="icon"
      type="image/x-icon"
      href="favicon-32x32.png" />
    <style>
      #boot-loader {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #fff;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div
      id="boot-loader"
      role="status"
      aria-live="polite"
      aria-label="Loading page">
      <img
        src="/assets/loader/plane-loader.gif"
        alt="Loading"
        width="180"
        height="180"
        decoding="async"
        fetchpriority="high" />
    </div>
    <app-root></app-root>
  </body>
</html>
